<script type="module">
      import { getAccounts, addTransfer, logWA, openWA } from "../firebase.js";

      let accounts = [];

      async function loadAccounts() {
        try {
          accounts = await getAccounts();
          const params = new URLSearchParams(window.location.search);
          const pid    = params.get('id');
          const pname  = params.get('name');
          const pphone = params.get('phone');
          if (pname) {
            const found = accounts.find(a => a.id === pid) || { id:pid||'', name:pname, phone:pphone||'', status:'active' };
            selectAccount({ id:found.id, name:found.name, phone:found.phone||'', status:found.status||'active' });
          }
        } catch(e) { console.error('Failed to load accounts:', e); }
      }
      loadAccounts();

      // ===== بحث واختيار الحساب =====
      const searchInput = document.getElementById('beneficiarySearch');
      const dropdown    = document.getElementById('accountDropdown');
      const selectedBox = document.getElementById('selectedAccount');

      function statusLabel(s) {
        if (s==='vip')  return '<span style="background:linear-gradient(135deg,#D4AF37,#c9a227);color:#fff;padding:1px 8px;border-radius:7px;font-size:11px">👑 VIP</span>';
        if (s==='late') return '<span style="background:#c62828;color:#fff;padding:1px 8px;border-radius:7px;font-size:11px">⚠️ متأخر</span>';
        return '<span style="background:#2e7d32;color:#fff;padding:1px 8px;border-radius:7px;font-size:11px">✅ نشط</span>';
      }

      function showDropdown(query) {
        const q = query.trim().toLowerCase();
        const filtered = q ? accounts.filter(a => (a.name||'').toLowerCase().includes(q)||(a.phone||'').includes(q)) : accounts.slice(0,10);
        if (!filtered.length) {
          dropdown.innerHTML = '<div style="padding:14px;text-align:center;color:#999;font-family:Tajawal,sans-serif;font-size:13px">لا توجد نتائج</div>';
          dropdown.style.display = 'block'; return;
        }
        dropdown.innerHTML = filtered.map(a => `
          <div class="account-option" data-id="${a.id}" data-name="${(a.name||'').replace(/"/g,'')}" data-phone="${(a.phone||'').replace(/"/g,'')}" data-status="${a.status||'active'}">
            <div class="acc-avatar">${(a.name||'ع').substring(0,2)}</div>
            <div><div class="acc-name">${a.name||'—'}</div><div class="acc-phone">${a.phone||'لا يوجد رقم'}</div></div>
            <div style="margin-right:auto">${statusLabel(a.status)}</div>
          </div>
        `).join('');
        dropdown.style.display = 'block';
        dropdown.querySelectorAll('.account-option').forEach(el => el.addEventListener('click', () => selectAccount(el.dataset)));
      }

      function selectAccount(data) {
        document.getElementById('beneficiary').value       = data.name;
        document.getElementById('beneficiaryPhone').value  = data.phone;
        document.getElementById('beneficiaryId').value     = data.id;
        document.getElementById('selAvatar').textContent   = (data.name||'').substring(0,2);
        document.getElementById('selName').textContent     = data.name;
        document.getElementById('selPhone').textContent    = data.phone || 'لا يوجد رقم';
        document.getElementById('selStatus').innerHTML     = statusLabel(data.status);
        searchInput.value = '';
        dropdown.style.display = 'none';
        selectedBox.style.display = 'block';
      }

      searchInput.addEventListener('focus', () => { if (accounts.length) showDropdown(searchInput.value); });
      searchInput.addEventListener('input', () => showDropdown(searchInput.value));
      document.addEventListener('click', e => {
        if (!e.target.closest('#beneficiarySearch') && !e.target.closest('#accountDropdown'))
          dropdown.style.display = 'none';
      });
      document.getElementById('clearSel').addEventListener('click', () => {
        document.getElementById('beneficiary').value = '';
        document.getElementById('beneficiaryPhone').value = '';
        document.getElementById('beneficiaryId').value = '';
        selectedBox.style.display = 'none';
        searchInput.value = '';
        searchInput.focus();
      });

      // ===== إرسال الحوالة + واتساب تلقائي =====
      document.getElementById('transferForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');

        const beneficiary       = document.getElementById('beneficiary').value.trim();
        const beneficiaryPhone  = document.getElementById('beneficiaryPhone').value.trim();

        if (!beneficiary) {
          if (typeof showNotification==='function') showNotification('يرجى اختيار المستلم من القائمة', 'error');
          return;
        }

        btn.disabled = true;
        btn.textContent = '⏳ جاري الحفظ...';

        const amount       = parseFloat(document.getElementById('transferAmount').value) || 0;
        const currency     = document.getElementById('currency').value;
        const transferType = document.getElementById('transferType').value;
        const status       = document.getElementById('transferStatus').value;
        const notes        = document.getElementById('notes').value.trim();
        const commission   = Math.round(amount * 0.05);
        const total        = amount + commission;

        const msg = `🏦 نظام محمد سالم للحوالات
  ━━━━━━━━━━━━━━━━━━
  📬 لديك حوالة جديدة!

  👤 المستلم: ${beneficiary}
  💰 المبلغ: ${amount.toLocaleString('ar-SA')} ${currency}
  📊 العمولة: ${commission.toLocaleString('ar-SA')} ${currency}
  💳 الإجمالي: ${total.toLocaleString('ar-SA')} ${currency}
  🔖 النوع: ${transferType}
  ━━━━━━━━━━━━━━━━━━
  للاستفسار تواصل معنا 📞`;

        try {
          await addTransfer({ beneficiary, beneficiaryPhone, amount, currency, commission, total, transferType, status, notes });
          await logWA({ type:'transfer_new', accountName:beneficiary, phone:beneficiaryPhone, message:msg });

          // واتساب تلقائي — يفتح فوراً
          if (beneficiaryPhone) {
            openWA(beneficiaryPhone, msg);
          }

          if (typeof showNotification==='function')
            showNotification(`✅ تم الحفظ${beneficiaryPhone ? ' وفُتح واتساب للمستلم' : ' (لا يوجد رقم للمستلم)'}`, 'success');

          // إعادة تعيين النموذج
          setTimeout(() => {
            this.reset();
            document.getElementById('beneficiary').value = '';
            document.getElementById('beneficiaryPhone').value = '';
            document.getElementById('beneficiaryId').value = '';
            document.getElementById('selectedAccount').style.display = 'none';
            document.getElementById('originalAmount').textContent  = '0 ر.ي';
            document.getElementById('commissionAmount').textContent = '0 ر.ي';
            document.getElementById('totalAmount').textContent      = '0 ر.ي';
          }, 500);

        } catch(err) {
          console.error(err);
          if (typeof showNotification==='function') showNotification('خطأ: ' + err.message, 'error');
        }

        btn.disabled = false;
        btn.textContent = '✅ تأكيد إنشاء الحوالة';
      });

      window.closeModal = function() {
        document.getElementById('waModal').style.display = 'none';
      };
    </script>

  </body>
  </html>
