<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>إنشاء حوالة - نظام محمد سالم</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .account-option { padding:12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;cursor:pointer; }
    .account-option:hover { background:#f5f5f5; }
    .acc-avatar { width:40px;height:40px;background:linear-gradient(135deg,#8B0000,#660000);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700; }
    .acc-name { font-weight:700;color:#333; }
    .acc-phone { font-size:12px;color:#999; }
    .payment-methods { display:flex;gap:8px;margin-bottom:4px; }
    .pm-btn { flex:1;padding:10px 6px;border:1.5px solid #ddd;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;font-family:Cairo,sans-serif;text-align:center;transition:all .2s; }
    .pm-btn.active { border-color:#8B0000;background:linear-gradient(135deg,#8B0000,#660000);color:#fff; }
    .code-box { background:#f0f8f0;border:1.5px dashed #2e7d32;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
    .code-val { font-size:15px;font-weight:800;color:#2e7d32;letter-spacing:1px; }
    .copy-btn { background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:Cairo; }
    .action-btns { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px; }
    .action-btns .btn-save { background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:Cairo; }
    .action-btns .btn-wa { background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:Cairo; }
    .btn-save-wa { width:100%;background:linear-gradient(135deg,#8B0000,#660000);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:Cairo;margin-top:8px; }
  </style>
</head>
<body>

  <div class="sub-header">
    <div class="sub-header-top">
      <img src="../logo.svg" alt="شعار" style="width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(212,175,55,0.7);flex-shrink:0;margin-left:4px" />
      <div class="back-btn">➡️</div>
      <span class="sub-header-title">💸 إنشاء حوالة جديدة</span>
      <div style="width:38px"></div>
    </div>
    <div class="sub-header-subtitle">حوالة آمنة وسريعة — كود تتبع تلقائي لكل عملية</div>
  </div>

  <div class="page-content">
    <form id="transferForm" style="margin-bottom:20px">

      <!-- كود الحوالة التلقائي -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">🔖 كود الحوالة (تلقائي)</label>
        <div class="code-box">
          <span class="code-val" id="displayCode">جاري التوليد...</span>
          <button type="button" class="copy-btn" id="copyCodeBtn">📋 نسخ</button>
        </div>
        <input id="transferCodeInput" type="hidden" />
      </div>

      <!-- اختيار المستقبل -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">👤 اختر المستقبل *</label>
        <div style="position:relative">
          <input id="beneficiarySearch" type="text" placeholder="ابحث عن العميل أو الرقم..."
            style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;outline:none"/>
          <div id="accountDropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #ddd;border-top:none;border-radius:0 0 12px 12px;max-height:200px;overflow-y:auto;z-index:100"></div>
        </div>
      </div>

      <!-- بطاقة العميل المختار -->
      <div id="selectedAccount" style="display:none;background:#f5f5f5;border:1.5px solid #2e7d32;border-radius:12px;padding:12px;margin-bottom:16px;position:relative">
        <button type="button" id="clearSel" style="position:absolute;top:8px;left:8px;background:#ff5252;color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:16px">×</button>
        <div style="display:flex;align-items:center;gap:10px">
          <div id="selAvatar" style="width:50px;height:50px;background:linear-gradient(135deg,#D4AF37,#c9a227);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px">--</div>
          <div style="flex:1">
            <div id="selName" style="font-weight:700;color:#333">—</div>
            <div id="selPhone" style="font-size:12px;color:#999">—</div>
            <div id="selStatus" style="font-size:11px;margin-top:4px"></div>
            <div id="selBalance" style="font-size:12px;color:#8B0000;font-weight:700;margin-top:2px"></div>
          </div>
        </div>
        <input id="beneficiary" type="hidden" required />
        <input id="beneficiaryPhone" type="hidden" />
        <input id="beneficiaryId" type="hidden" />
        <input id="beneficiaryBalance" type="hidden" value="0" />
      </div>

      <!-- المبلغ -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">💰 المبلغ *</label>
        <input id="transferAmount" type="number" min="0" placeholder="أدخل المبلغ" required
          style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;outline:none"/>
      </div>

      <!-- العملة -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">💵 العملة</label>
        <select id="currency" style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;background:#fff;outline:none">
          <option value="ر.ي">ر.ي - ريال يمني</option>
          <option value="ر.س">ر.س - ريال سعودي</option>
          <option value="$">$ - دولار أمريكي</option>
          <option value="AED">AED - درهم إماراتي</option>
        </select>
      </div>

      <!-- طريقة دفع الحوالة -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">💳 طريقة دفع الحوالة *</label>
        <div class="payment-methods">
          <button type="button" class="pm-btn active" data-pm="cash">💵 نقدي</button>
          <button type="button" class="pm-btn" data-pm="balance">🏦 من الرصيد</button>
          <button type="button" class="pm-btn" data-pm="debt">📋 دين</button>
        </div>
        <input id="paymentMethod" type="hidden" value="cash" />
        <div id="pmNote" style="font-size:11px;color:#666;font-family:Tajawal;margin-top:4px;padding:6px 10px;background:#f9f9f9;border-radius:8px">💵 السداد نقداً عند إرسال الحوالة</div>
      </div>

      <!-- نوع الحوالة -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">🔖 نوع الحوالة</label>
        <select id="transferType" style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;background:#fff;outline:none">
          <option value="تحويل عادي">تحويل عادي</option>
          <option value="تحويل عاجل">تحويل عاجل</option>
          <option value="دفعة">دفعة</option>
          <option value="سحب">سحب</option>
        </select>
      </div>

      <!-- الحالة -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">📊 حالة الحوالة</label>
        <select id="transferStatus" style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;background:#fff;outline:none">
          <option value="pending">⏳ معلقة - قيد التنفيذ</option>
          <option value="sent">📤 مرسلة</option>
          <option value="completed">✅ مستلمة - مكتملة</option>
          <option value="cancelled">❌ ملغاة</option>
        </select>
      </div>

      <!-- الملاحظات -->
      <div style="margin-bottom:16px">
        <label style="font-size:13px;font-weight:700;color:#333;display:block;margin-bottom:8px">📝 ملاحظات</label>
        <textarea id="notes" placeholder="أضف ملاحظات إضافية..." style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;outline:none;min-height:80px;resize:vertical"></textarea>
      </div>

      <!-- الملخص -->
      <div style="background:#f9f9f9;border:1.5px solid #e0e0e0;border-radius:12px;padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #ddd">
          <span style="color:#666">المبلغ الأصلي:</span>
          <span id="originalAmount" style="font-weight:700;color:#333">0 ر.ي</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #ddd">
          <span style="color:#666">العمولة (5%):</span>
          <span id="commissionAmount" style="font-weight:700;color:#e65100">0 ر.ي</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding-top:8px">
          <span style="color:#333;font-weight:700">الإجمالي:</span>
          <span id="totalAmount" style="font-weight:800;color:#8B0000;font-size:16px">0 ر.ي</span>
        </div>
      </div>

      <!-- أزرار الإجراءات -->
      <div class="action-btns">
        <button type="button" id="btnSaveOnly" class="btn-save">💾 حفظ فقط</button>
        <button type="button" id="btnWAOnly" class="btn-wa">💬 إرسال واتساب</button>
      </div>
      <button type="button" id="btnSaveAndWA" class="btn-save-wa">✅ حفظ وإرسال واتساب معاً</button>

    </form>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item" data-href="../index.html"><span class="nav-icon">🏠</span><span>الرئيسية</span></div>
    <div class="nav-item active" data-href="transfer.html"><span class="nav-icon">💸</span><span>تحويل</span></div>
    <div class="nav-item" data-href="vip.html"><span class="nav-icon">👑</span><span>المميزين</span></div>
    <div class="nav-item" data-href="reports.html"><span class="nav-icon">📊</span><span>تقارير</span></div>
  </nav>

  <script src="../script.js"></script>

  <script type="module">
    import { getAccounts, addTransfer, notifyClient, buildMsg, generateTransferCode } from "../firebase.js";

    let accounts = [];
    let currentCode = generateTransferCode();

    // عرض الكود
    document.getElementById('displayCode').textContent = currentCode;
    document.getElementById('transferCodeInput').value = currentCode;

    // نسخ الكود
    document.getElementById('copyCodeBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(currentCode).then(() => {
        showNotification('تم نسخ كود الحوالة ✓', 'success');
      }).catch(() => {
        showNotification(currentCode, 'info');
      });
    });

    // تحميل الحسابات
    async function loadAccounts() {
      try {
        accounts = await getAccounts();
        const params = new URLSearchParams(window.location.search);
        const pid = params.get('id');
        const pname = params.get('name');
        const pphone = params.get('phone');
        if (pname) {
          const found = accounts.find(a => a.id === pid) || { id: pid||'', name: pname, phone: pphone||'', status:'active', balance:0 };
          selectAccount({ id: found.id, name: found.name, phone: found.phone||'', status: found.status||'active', balance: found.balance||0 });
        }
      } catch(e) {
        if (typeof showNotification === 'function') showNotification('خطأ في تحميل الحسابات', 'error');
      }
    }
    loadAccounts();

    // طريقة الدفع
    const pmBtns = document.querySelectorAll('.pm-btn');
    const pmNotes = {
      cash: '💵 السداد نقداً عند إرسال الحوالة',
      balance: '🏦 سيُخصم المبلغ من رصيد العميل تلقائياً',
      debt: '📋 سيُسجل المبلغ كدين على العميل في كشف حسابه'
    };
    pmBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        pmBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('paymentMethod').value = btn.dataset.pm;
        document.getElementById('pmNote').textContent = pmNotes[btn.dataset.pm] || '';
      });
    });

    // حالة العميل
    function statusLabel(s) {
      if (s === 'vip') return '<span style="background:linear-gradient(135deg,#D4AF37,#c9a227);color:#fff;padding:1px 8px;border-radius:7px;font-size:11px">👑 VIP</span>';
      if (s === 'late') return '<span style="background:#c62828;color:#fff;padding:1px 8px;border-radius:7px;font-size:11px">⚠️ متأخر</span>';
      return '<span style="background:#2e7d32;color:#fff;padding:1px 8px;border-radius:7px;font-size:11px">✅ نشط</span>';
    }

    const searchInput = document.getElementById('beneficiarySearch');
    const dropdown = document.getElementById('accountDropdown');

    function showDropdown(query) {
      const q = query.trim().toLowerCase();
      const filtered = q ? accounts.filter(a => (a.name||'').toLowerCase().includes(q) || (a.phone||'').includes(q)) : accounts.slice(0, 10);
      if (!filtered.length) {
        dropdown.innerHTML = '<div style="padding:14px;text-align:center;color:#999;font-family:Tajawal;font-size:13px">لا توجد نتائج</div>';
        dropdown.style.display = 'block';
        return;
      }
      dropdown.innerHTML = filtered.map(a => `
        <div class="account-option" data-id="${a.id||''}" data-name="${(a.name||'').replace(/"/g,'')}" data-phone="${(a.phone||'').replace(/"/g,'')}" data-status="${a.status||'active'}" data-balance="${a.balance||0}">
          <div class="acc-avatar">${(a.name||'ع').substring(0,2)}</div>
          <div style="flex:1">
            <div class="acc-name">${a.name||'—'}</div>
            <div class="acc-phone">${a.phone||'لا يوجد رقم'} · الرصيد: ${Number(a.balance||0).toLocaleString('ar-SA')} ر.ي</div>
          </div>
          <div>${statusLabel(a.status)}</div>
        </div>`).join('');
      dropdown.style.display = 'block';
      dropdown.querySelectorAll('.account-option').forEach(el => el.addEventListener('click', () => selectAccount(el.dataset)));
    }

    function selectAccount(data) {
      document.getElementById('beneficiary').value = data.name;
      document.getElementById('beneficiaryPhone').value = data.phone || '';
      document.getElementById('beneficiaryId').value = data.id || '';
      document.getElementById('beneficiaryBalance').value = data.balance || 0;
      document.getElementById('selAvatar').textContent = (data.name||'').substring(0,2);
      document.getElementById('selName').textContent = data.name;
      document.getElementById('selPhone').textContent = data.phone || 'لا يوجد رقم';
      document.getElementById('selStatus').innerHTML = statusLabel(data.status);
      document.getElementById('selBalance').textContent = `الرصيد: ${Number(data.balance||0).toLocaleString('ar-SA')} ر.ي`;
      searchInput.value = '';
      dropdown.style.display = 'none';
      document.getElementById('selectedAccount').style.display = 'block';
    }

    searchInput.addEventListener('focus', () => { if (accounts.length) showDropdown(searchInput.value); });
    searchInput.addEventListener('input', () => showDropdown(searchInput.value));
    document.addEventListener('click', e => {
      if (!e.target.closest('#beneficiarySearch') && !e.target.closest('#accountDropdown')) dropdown.style.display = 'none';
    });
    document.getElementById('clearSel').addEventListener('click', e => {
      e.preventDefault();
      ['beneficiary','beneficiaryPhone','beneficiaryId'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('beneficiaryBalance').value = 0;
      document.getElementById('selectedAccount').style.display = 'none';
      searchInput.value = ''; searchInput.focus();
    });

    document.getElementById('transferAmount').addEventListener('input', function() {
      const amount = parseFloat(this.value) || 0;
      const commission = Math.round(amount * 0.05);
      const total = amount + commission;
      const cur = document.getElementById('currency').value;
      document.getElementById('originalAmount').textContent = amount.toLocaleString('ar-SA') + ' ' + cur;
      document.getElementById('commissionAmount').textContent = commission.toLocaleString('ar-SA') + ' ' + cur;
      document.getElementById('totalAmount').textContent = total.toLocaleString('ar-SA') + ' ' + cur;
    });

    function getFormData() {
      const beneficiary = document.getElementById('beneficiary').value.trim();
      const beneficiaryPhone = document.getElementById('beneficiaryPhone').value.trim();
      const beneficiaryId = document.getElementById('beneficiaryId').value.trim();
      const amount = parseFloat(document.getElementById('transferAmount').value) || 0;
      const currency = document.getElementById('currency').value;
      const transferType = document.getElementById('transferType').value;
      const status = document.getElementById('transferStatus').value;
      const notes = document.getElementById('notes').value.trim();
      const paymentMethod = document.getElementById('paymentMethod').value;
      const transferCode = document.getElementById('transferCodeInput').value;
      const commission = Math.round(amount * 0.05);
      const total = amount + commission;
      return { beneficiary, beneficiaryPhone, beneficiaryId, amount, currency, transferType, status, notes, paymentMethod, transferCode, commission, total };
    }

    function resetForm() {
      document.getElementById('transferForm').reset();
      ['beneficiary','beneficiaryPhone','beneficiaryId'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('beneficiaryBalance').value = 0;
      document.getElementById('selectedAccount').style.display = 'none';
      ['originalAmount','commissionAmount','totalAmount'].forEach(id => document.getElementById(id).textContent = '0 ر.ي');
      // توليد كود جديد
      currentCode = generateTransferCode();
      document.getElementById('displayCode').textContent = currentCode;
      document.getElementById('transferCodeInput').value = currentCode;
      pmBtns.forEach(b => b.classList.remove('active'));
      pmBtns[0].classList.add('active');
      document.getElementById('paymentMethod').value = 'cash';
      document.getElementById('pmNote').textContent = pmNotes.cash;
    }

    // حفظ فقط
    document.getElementById('btnSaveOnly').addEventListener('click', async () => {
      const d = getFormData();
      if (!d.beneficiary) { showNotification('يرجى اختيار المستقبل', 'error'); return; }
      if (!d.amount) { showNotification('يرجى إدخال المبلغ', 'error'); return; }
      const btn = document.getElementById('btnSaveOnly');
      btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...';
      try {
        await addTransfer(d);
        showNotification(`✅ تم حفظ الحوالة — الكود: ${d.transferCode}`, 'success');
        setTimeout(resetForm, 800);
      } catch(err) {
        showNotification('❌ خطأ في الحفظ: ' + (err.message||''), 'error');
      } finally {
        btn.disabled = false; btn.textContent = '💾 حفظ فقط';
      }
    });

    // إرسال واتساب فقط
    document.getElementById('btnWAOnly').addEventListener('click', async () => {
      const d = getFormData();
      if (!d.beneficiary) { showNotification('يرجى اختيار المستقبل أولاً', 'error'); return; }
      const msgType = d.status === 'completed' ? 'transfer_completed' : 'transfer_new';
      await notifyClient(d.beneficiaryPhone, msgType, { name: d.beneficiary, amount: d.amount, currency: d.currency, commission: d.commission, transferType: d.transferType, transferCode: d.transferCode, paymentMethod: d.paymentMethod });
      showNotification('✅ تم فتح واتساب', 'success');
    });

    // حفظ وإرسال معاً
    document.getElementById('btnSaveAndWA').addEventListener('click', async () => {
      const d = getFormData();
      if (!d.beneficiary) { showNotification('يرجى اختيار المستقبل', 'error'); return; }
      if (!d.amount) { showNotification('يرجى إدخال المبلغ', 'error'); return; }
      const btn = document.getElementById('btnSaveAndWA');
      btn.disabled = true; btn.textContent = '⏳ جاري الحفظ والإرسال...';
      try {
        await addTransfer(d);
        const msgType = d.status === 'completed' ? 'transfer_completed' : 'transfer_new';
        await notifyClient(d.beneficiaryPhone, msgType, { name: d.beneficiary, amount: d.amount, currency: d.currency, commission: d.commission, transferType: d.transferType, transferCode: d.transferCode, paymentMethod: d.paymentMethod });
        showNotification(`✅ تم الحفظ والإرسال — الكود: ${d.transferCode}`, 'success');
        setTimeout(resetForm, 800);
      } catch(err) {
        showNotification('❌ خطأ: ' + (err.message||''), 'error');
      } finally {
        btn.disabled = false; btn.textContent = '✅ حفظ وإرسال واتساب معاً';
      }
    });
  </script>
</body>
</html>
