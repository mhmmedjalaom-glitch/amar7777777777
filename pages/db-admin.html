<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>قاعدة البيانات - نظام محمد سالم</title>
  <link rel="stylesheet" href="../style.css"/>
  <style>
    .acc-card {
      background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.07);border:1.5px solid #f0f0f0;
      cursor:pointer;transition:transform .15s,box-shadow .15s;
    }
    .acc-card:active { transform:scale(.98); }
    .acc-card:hover  { box-shadow:0 4px 16px rgba(0,0,0,.12);border-color:#D4AF37; }
    .acc-avatar {
      width:46px;height:46px;border-radius:13px;
      background:linear-gradient(135deg,#8B0000,#c62828);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:800;color:#fff;flex-shrink:0;
    }
    .acc-avatar.vip { background:linear-gradient(135deg,#D4AF37,#c9a227); }
    .acc-avatar.late { background:linear-gradient(135deg,#e65100,#bf360c); }
    .acc-name { font-size:15px;font-weight:800;color:#1a1a1a; }
    .acc-phone { font-size:12px;color:#888;font-family:Tajawal;margin-top:1px; }
    .acc-bal-row { display:flex;gap:8px;margin-top:10px; }
    .acc-bal { flex:1;background:#f9f9f9;border-radius:10px;padding:8px 10px; }
    .acc-bal-label { font-size:10px;color:#999;font-family:Tajawal; }
    .acc-bal-val { font-size:15px;font-weight:800;margin-top:2px; }
    .status-badge {
      display:inline-block;padding:2px 9px;border-radius:7px;
      font-size:10px;font-weight:700;
    }
    .s-active   { background:#e8f5e9;color:#2e7d32; }
    .s-vip      { background:#fff8e1;color:#f9a825; }
    .s-late     { background:#ffebee;color:#c62828; }

    /* نافذة العمليات */
    .ops-overlay {
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.55);z-index:9999;
      align-items:flex-end;justify-content:center;
    }
    .ops-overlay.open { display:flex; }
    .ops-sheet {
      background:#f5f5f5;border-radius:22px 22px 0 0;
      width:100%;max-width:480px;max-height:90vh;
      display:flex;flex-direction:column;overflow:hidden;
    }
    .ops-header {
      background:#fff;padding:16px 18px 12px;
      border-bottom:1px solid #eee;flex-shrink:0;
    }
    .ops-title { font-size:16px;font-weight:800;color:#1a1a1a; }
    .ops-sub   { font-size:12px;color:#888;font-family:Tajawal;margin-top:2px; }
    .ops-bal-row { display:flex;gap:8px;margin-top:12px; }
    .ops-bal { flex:1;border-radius:10px;padding:10px;text-align:center; }
    .ops-bal-label { font-size:10px;color:#666;font-family:Tajawal; }
    .ops-bal-num { font-size:18px;font-weight:800;margin-top:2px; }

    .ops-filter {
      display:flex;gap:6px;padding:10px 14px;
      background:#fff;border-bottom:1px solid #eee;
      overflow-x:auto;flex-shrink:0;
    }
    .ops-filter .chip {
      padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;
      background:#f0f0f0;color:#555;cursor:pointer;white-space:nowrap;
      border:none;font-family:Cairo;
    }
    .ops-filter .chip.active { background:#8B0000;color:#fff; }

    .ops-body { overflow-y:auto;flex:1;padding:10px 14px; }
    .op-row {
      background:#fff;border-radius:12px;padding:12px 14px;
      margin-bottom:8px;display:flex;align-items:center;gap:12px;
      box-shadow:0 1px 4px rgba(0,0,0,.06);
    }
    .op-icon {
      width:38px;height:38px;border-radius:11px;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;flex-shrink:0;
    }
    .op-info { flex:1;min-width:0; }
    .op-code { font-size:12px;font-weight:700;color:#333; }
    .op-date { font-size:10px;color:#999;font-family:Tajawal;margin-top:2px; }
    .op-status { font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;margin-top:3px;display:inline-block; }
    .op-amount { text-align:left;flex-shrink:0; }
    .op-amount-val { font-size:14px;font-weight:800; }
    .op-amount-cur { font-size:10px;color:#999;margin-top:1px; }

    .empty-ops { text-align:center;padding:40px 20px;color:#999;font-family:Tajawal; }
    .loading-ops { text-align:center;padding:30px;color:#8B0000;font-family:Tajawal; }

    .ops-stats {
      display:flex;gap:8px;padding:8px 14px;
      background:#fff;border-bottom:1px solid #eee;flex-shrink:0;
    }
    .ops-stat { flex:1;text-align:center; }
    .ops-stat-val { font-size:17px;font-weight:800; }
    .ops-stat-label { font-size:10px;color:#999;font-family:Tajawal; }
  </style>
</head>
<body>

  <div class="sub-header">
    <div class="sub-header-top">
      <img src="../logo.svg" alt="شعار" style="width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(212,175,55,0.7);flex-shrink:0;margin-left:4px"/>
      <div class="back-btn" onclick="history.back()">➡️</div>
      <span class="sub-header-title">📋 الحسابات — قاعدة البيانات</span>
      <div class="header-icon-btn" id="refreshBtn" title="تحديث">🔄</div>
    </div>
    <div class="sub-header-subtitle" id="pageStatus">جاري تحميل الحسابات...</div>
  </div>

  <div class="page-content">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="بحث بالاسم أو الهاتف..."/>
    </div>

    <div class="filter-chips">
      <div class="chip active" data-f="all">الكل</div>
      <div class="chip" data-f="active">نشط ✅</div>
      <div class="chip" data-f="vip">VIP 👑</div>
      <div class="chip" data-f="late">متأخر ⚠️</div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div class="stat-card" style="flex:1;padding:10px">
        <div class="stat-value" id="stTotal" style="font-size:18px">—</div>
        <div class="stat-label">إجمالي</div>
      </div>
      <div class="stat-card" style="flex:1;padding:10px">
        <div class="stat-value" id="stActive" style="font-size:18px;color:#2e7d32">—</div>
        <div class="stat-label">نشط</div>
      </div>
      <div class="stat-card" style="flex:1;padding:10px">
        <div class="stat-value" id="stVip" style="font-size:18px;color:#f9a825">—</div>
        <div class="stat-label">VIP</div>
      </div>
      <div class="stat-card" style="flex:1;padding:10px">
        <div class="stat-value" id="stLate" style="font-size:18px;color:#c62828">—</div>
        <div class="stat-label">متأخر</div>
      </div>
    </div>

    <div id="accountsList">
      <p style="text-align:center;padding:40px;color:#999;font-family:Tajawal">جاري التحميل...</p>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item" data-href="../index.html"><span class="nav-icon">🏠</span><span>الرئيسية</span></div>
    <div class="nav-item" data-href="transfer.html"><span class="nav-icon">💸</span><span>تحويل</span></div>
    <div class="nav-item" data-href="accounts.html"><span class="nav-icon">👥</span><span>الحسابات</span></div>
    <div class="nav-item" data-href="reports.html"><span class="nav-icon">📊</span><span>تقارير</span></div>
  </nav>

  <!-- نافذة عمليات الحساب -->
  <div class="ops-overlay" id="opsOverlay">
    <div class="ops-sheet">

      <div class="ops-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="ops-title" id="opsName">—</div>
            <div class="ops-sub" id="opsPhone">—</div>
          </div>
          <button onclick="closeOps()" style="background:none;border:none;font-size:24px;color:#999;cursor:pointer;line-height:1;padding:0">×</button>
        </div>
        <div class="ops-bal-row">
          <div class="ops-bal" style="background:#fff3e0">
            <div class="ops-bal-label">الرصيد (ر.ي)</div>
            <div class="ops-bal-num" style="color:#8B0000" id="opsBalYER">—</div>
          </div>
          <div class="ops-bal" style="background:#e3f2fd">
            <div class="ops-bal-label">الرصيد (ر.س)</div>
            <div class="ops-bal-num" style="color:#1565c0" id="opsBalSAR">—</div>
          </div>
        </div>
      </div>

      <div class="ops-stats">
        <div class="ops-stat">
          <div class="ops-stat-val" id="opsTotalOps" style="color:#1565c0">—</div>
          <div class="ops-stat-label">إجمالي العمليات</div>
        </div>
        <div class="ops-stat">
          <div class="ops-stat-val" id="opsTransfers" style="color:#8B0000">—</div>
          <div class="ops-stat-label">حوالات</div>
        </div>
        <div class="ops-stat">
          <div class="ops-stat-val" id="opsVouchers" style="color:#2e7d32">—</div>
          <div class="ops-stat-label">سندات</div>
        </div>
      </div>

      <div class="ops-filter">
        <button class="chip active" data-op="all">الكل</button>
        <button class="chip" data-op="transfer">💸 حوالات</button>
        <button class="chip" data-op="voucher">🧾 سندات</button>
        <button class="chip" data-op="completed">مكتملة ✅</button>
        <button class="chip" data-op="pending">معلقة ⏳</button>
      </div>

      <div class="ops-body" id="opsList">
        <div class="loading-ops">⏳ جاري تحميل العمليات...</div>
      </div>

    </div>
  </div>

<script>
const PROXY = "https://constsupabaseurlhttpsezektgzwesrtezeghmrssupabaseco.bdkylh0.workers.dev";
const KEY   = "sb_publishable_yxYW7KsjVtq_0kMYuaODng_4yvhyRum";

let allAccounts = [];
let currentFilter = 'all';
let currentSearch  = '';
let opsAllEntries  = [];
let opsFilter      = 'all';

// ============ جلب البيانات من Supabase ============
async function sbGet(table, query = '') {
  const url = `${PROXY}/rest/v1/${table}?${query}`;
  const res = await fetch(url, {
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ============ تحميل الحسابات ============
async function loadAccounts() {
  document.getElementById('pageStatus').textContent = 'جاري التحميل من قاعدة البيانات...';
  try {
    const rows = await sbGet('accounts', 'order=created_at.desc&limit=500');
    allAccounts = rows;
    renderAccounts();
    document.getElementById('pageStatus').textContent = `✅ ${rows.length} حساب محمّل من Supabase`;
  } catch(e) {
    document.getElementById('pageStatus').textContent = '❌ خطأ في الاتصال بقاعدة البيانات';
    document.getElementById('accountsList').innerHTML =
      `<div style="text-align:center;padding:40px;color:#c62828;font-family:Tajawal">
        ❌ تعذّر الاتصال بقاعدة البيانات<br>
        <small style="color:#999">${e.message}</small>
      </div>`;
  }
}

// ============ عرض الحسابات ============
function renderAccounts() {
  let list = allAccounts;

  // تصفية بالحالة
  if (currentFilter !== 'all') list = list.filter(a => a.status === currentFilter);

  // بحث
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(a =>
      (a.name||'').toLowerCase().includes(q) ||
      (a.phone||'').includes(q)
    );
  }

  // إحصاءات
  document.getElementById('stTotal').textContent  = allAccounts.length;
  document.getElementById('stActive').textContent = allAccounts.filter(a=>a.status==='active').length;
  document.getElementById('stVip').textContent    = allAccounts.filter(a=>a.status==='vip').length;
  document.getElementById('stLate').textContent   = allAccounts.filter(a=>a.status==='late').length;

  if (!list.length) {
    document.getElementById('accountsList').innerHTML =
      '<p style="text-align:center;padding:40px;color:#999;font-family:Tajawal">لا توجد حسابات</p>';
    return;
  }

  const statusLabel = { active:'نشط ✅', vip:'VIP 👑', late:'متأخر ⚠️' };
  const statusClass = { active:'s-active', vip:'s-vip', late:'s-late' };
  const fmt = n => Number(n||0).toLocaleString('ar-SA');
  const initials = name => {
    const parts = (name||'?').trim().split(' ');
    return parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0].slice(0,2);
  };

  document.getElementById('accountsList').innerHTML = list.map(acc => `
    <div class="acc-card" onclick="openOps('${acc.id}','${(acc.name||'').replace(/'/g,'')}','${acc.phone||''}',${Number(acc.balance)||0},${Number(acc.balance_sar)||0},'${acc.status||'active'}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="acc-avatar ${acc.status==='vip'?'vip':acc.status==='late'?'late':''}">${initials(acc.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="acc-name">${acc.name||'—'}</div>
          <div class="acc-phone">${acc.phone||'لا يوجد رقم'}</div>
          <span class="status-badge ${statusClass[acc.status]||'s-active'}">${statusLabel[acc.status]||'نشط'}</span>
        </div>
        <div style="color:#ccc;font-size:18px">←</div>
      </div>
      <div class="acc-bal-row">
        <div class="acc-bal">
          <div class="acc-bal-label">الرصيد (ر.ي)</div>
          <div class="acc-bal-val" style="color:#8B0000">${fmt(acc.balance)}</div>
        </div>
        <div class="acc-bal">
          <div class="acc-bal-label">الرصيد (ر.س)</div>
          <div class="acc-bal-val" style="color:#1565c0">${fmt(acc.balance_sar)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ============ فتح عمليات الحساب ============
async function openOps(id, name, phone, balYER, balSAR, status) {
  opsAllEntries = [];
  opsFilter = 'all';

  // تعيين بيانات الهيدر
  document.getElementById('opsName').textContent   = name;
  document.getElementById('opsPhone').textContent  = phone || 'لا يوجد رقم';
  document.getElementById('opsBalYER').textContent = Number(balYER||0).toLocaleString('ar-SA');
  document.getElementById('opsBalSAR').textContent = Number(balSAR||0).toLocaleString('ar-SA');
  document.getElementById('opsTotalOps').textContent = '—';
  document.getElementById('opsTransfers').textContent = '—';
  document.getElementById('opsVouchers').textContent  = '—';
  document.getElementById('opsList').innerHTML = '<div class="loading-ops">⏳ جاري تحميل العمليات...</div>';

  // إعادة تعيين فلتر الأزرار
  document.querySelectorAll('.ops-filter .chip').forEach(c => c.classList.toggle('active', c.dataset.op === 'all'));

  // فتح النافذة
  document.getElementById('opsOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    // جلب الحوالات والسندات معاً من Supabase
    const trfQuery = phone
      ? `receiver_phone=eq.${encodeURIComponent(phone)}&order=created_at.desc&limit=500`
      : `order=created_at.desc&limit=1`;

    const [vouchers, transfers] = await Promise.all([
      sbGet('vouchers', `account_id=eq.${encodeURIComponent(id)}&order=created_at.desc&limit=500`),
      phone ? sbGet('transfers', trfQuery) : Promise.resolve([])
    ]);

    const vEntries = (vouchers||[]).map(v => ({
      ...v,
      entryType: 'voucher',
      _ts: new Date(v.created_at).getTime()
    }));
    const tEntries = (transfers||[]).map(t => ({
      ...t,
      entryType: 'transfer',
      _ts: new Date(t.created_at).getTime()
    }));

    opsAllEntries = [...vEntries, ...tEntries].sort((a,b) => b._ts - a._ts);

    // إحصاءات
    document.getElementById('opsTotalOps').textContent  = opsAllEntries.length;
    document.getElementById('opsTransfers').textContent = tEntries.length;
    document.getElementById('opsVouchers').textContent  = vEntries.length;

    renderOps();
  } catch(e) {
    document.getElementById('opsList').innerHTML =
      `<div class="empty-ops">❌ خطأ في جلب العمليات<br><small>${e.message}</small></div>`;
  }
}

// ============ عرض العمليات ============
function renderOps() {
  let list = opsAllEntries;

  if      (opsFilter === 'transfer')  list = list.filter(e => e.entryType === 'transfer');
  else if (opsFilter === 'voucher')   list = list.filter(e => e.entryType === 'voucher');
  else if (opsFilter === 'completed') list = list.filter(e => e.entryType==='transfer' && e.status==='completed');
  else if (opsFilter === 'pending')   list = list.filter(e => e.entryType==='transfer' && e.status==='pending');

  if (!list.length) {
    document.getElementById('opsList').innerHTML =
      '<div class="empty-ops">📭 لا توجد عمليات في هذه الفئة</div>';
    return;
  }

  const statusColors = { completed:'#2e7d32', pending:'#f57c00', cancelled:'#c62828', sent:'#1565c0' };
  const statusTx     = { completed:'مكتملة ✅', pending:'معلقة ⏳', cancelled:'ملغاة ❌', sent:'مرسلة 📤' };

  document.getElementById('opsList').innerHTML = list.map(e => {
    const d = new Date(e.created_at || e._ts || 0);
    const dateStr = d.toLocaleDateString('ar-SA') + ' ' + d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});

    if (e.entryType === 'transfer') {
      const np = (e.notes||'').split('|');
      const code = np[0]?.trim() || '—';
      const sc = statusColors[e.status] || '#666';
      return `<div class="op-row">
        <div class="op-icon" style="background:${sc}20">💸</div>
        <div class="op-info">
          <div class="op-code">${code}</div>
          <div class="op-date">${dateStr}</div>
          <span class="op-status" style="background:${sc}20;color:${sc}">${statusTx[e.status]||e.status}</span>
        </div>
        <div class="op-amount">
          <div class="op-amount-val" style="color:#8B0000">${Number(e.amount||0).toLocaleString('ar-SA')}</div>
          <div class="op-amount-cur">${e.currency||'ر.ي'}</div>
        </div>
      </div>`;
    } else {
      const isR = e.type === 'receipt';
      return `<div class="op-row">
        <div class="op-icon" style="background:${isR?'#e8f5e9':'#fff3e0'}">${isR?'📥':'📤'}</div>
        <div class="op-info">
          <div class="op-code">${isR?'سند قبض':'سند صرف'}</div>
          <div class="op-date">${dateStr}</div>
          <div style="font-size:11px;color:#666;margin-top:2px">${e.reason||'—'}</div>
        </div>
        <div class="op-amount">
          <div class="op-amount-val" style="color:${isR?'#2e7d32':'#c62828'}">${isR?'+':'−'}${Number(e.amount||0).toLocaleString('ar-SA')}</div>
          <div class="op-amount-cur">${e.currency==='SAR'?'ر.س':'ر.ي'}</div>
        </div>
      </div>`;
    }
  }).join('');
}

function closeOps() {
  document.getElementById('opsOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ============ أحداث ============
document.getElementById('searchInput').addEventListener('input', function() {
  currentSearch = this.value;
  renderAccounts();
});

document.querySelectorAll('.filter-chips .chip').forEach(chip => {
  chip.addEventListener('click', function() {
    document.querySelectorAll('.filter-chips .chip').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.f;
    renderAccounts();
  });
});

document.querySelectorAll('.ops-filter .chip').forEach(chip => {
  chip.addEventListener('click', function() {
    document.querySelectorAll('.ops-filter .chip').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    opsFilter = this.dataset.op;
    renderOps();
  });
});

document.getElementById('refreshBtn').addEventListener('click', loadAccounts);
document.getElementById('opsOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('opsOverlay')) closeOps();
});

// nav
document.querySelectorAll('.nav-item[data-href]').forEach(el => {
  el.addEventListener('click', () => { window.location.href = el.dataset.href; });
});
document.querySelector('.back-btn')?.addEventListener('click', () => history.back());

// تحميل عند الفتح
loadAccounts();
</script>
</body>
</html>
