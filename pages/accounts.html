<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>إدارة الحسابات - نظام محمد سالم</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="sub-header">
    <div class="sub-header-top">
      <div class="back-btn">➡️</div>
      <span class="sub-header-title">إدارة الحسابات</span>
      <div class="header-icon-btn" style="cursor: pointer;">➕</div>
    </div>
    <div class="sub-header-subtitle">كافة الحسابات المسجلة في النظام</div>
  </div>

  <div class="page-content">

    <!-- Search Bar -->
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="بحث عن حساب..." id="searchInput" />
    </div>

    <!-- Filter Chips -->
    <div class="filter-chips">
      <div class="chip active" data-filter="all">الكل</div>
      <div class="chip" data-filter="active">نشط</div>
      <div class="chip" data-filter="late">متأخر</div>
      <div class="chip" data-filter="vip">VIP</div>
    </div>

    <!-- Stats Row -->
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div class="stat-card" style="flex:1;padding:12px">
        <div class="stat-value" style="font-size:20px">0</div>
        <div class="stat-label">إجمالي الحسابات</div>
      </div>
      <div class="stat-card" style="flex:1;padding:12px">
        <div class="stat-value" style="font-size:20px;color:#2e7d32">0</div>
        <div class="stat-label">حساب نشط</div>
      </div>
      <div class="stat-card" style="flex:1;padding:12px">
        <div class="stat-value" style="font-size:20px;color:#c62828">0</div>
        <div class="stat-label">متأخر</div>
      </div>
    </div>

    <!-- Accounts List -->
    <div class="op-list" id="accountsList">
      <p style="text-align:center;color:#999;padding:32px;font-family:Tajawal,sans-serif">جاري تحميل الحسابات...</p>
    </div>

    <div style="height:16px"></div>
    <button class="btn btn-primary" id="addNewAccountBtn" style="width:100%;padding:14px;background:linear-gradient(135deg,#8B0000,#660000);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer">
      ➕ إنشاء حساب جديد
    </button>

  </div>

  <nav class="bottom-nav">
    <div class="nav-item" data-href="../index.html">
      <span class="nav-icon">🏠</span><span>الرئيسية</span>
    </div>
    <div class="nav-item" data-href="transfer.html">
      <span class="nav-icon">💸</span><span>تحويل</span>
    </div>
    <div class="nav-item" data-href="vip.html">
      <span class="nav-icon">👑</span><span>المميزين</span>
    </div>
    <div class="nav-item" data-href="reports.html">
      <span class="nav-icon">📊</span><span>تقارير</span>
    </div>
  </nav>

  <script src="../script.js"></script>

  <!-- Modal إضافة حساب جديد -->
  <div id="addAccountModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:flex-end;justify-content:center">
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:430px;direction:rtl;font-family:Cairo,sans-serif;max-height:85vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <h3 style="font-size:16px;font-weight:800;margin:0;color:#1a1a1a">➕ إضافة حساب جديد</h3>
        <span id="closeModal" style="font-size:26px;cursor:pointer;color:#999;line-height:1">×</span>
      </div>
      <form id="addAccountForm" autocomplete="off">
        <div style="margin-bottom:12px">
          <label style="font-size:13px;font-weight:700;color:#444;display:block;margin-bottom:6px">اسم العميل *</label>
          <input id="accName" type="text" required placeholder="أدخل الاسم الكامل"
            style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;outline:none"/>
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;font-weight:700;color:#444;display:block;margin-bottom:6px">رقم الهاتف (للواتساب)</label>
          <input id="accPhone" type="tel" placeholder="967XXXXXXXXX"
            style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;direction:ltr;outline:none"/>
        </div>
        <div style="margin-bottom:12px">
          <label style="font-size:13px;font-weight:700;color:#444;display:block;margin-bottom:6px">الرصيد الابتدائي (ر.ي)</label>
          <input id="accBalance" type="number" placeholder="0" min="0"
            style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;outline:none"/>
        </div>
        <div style="margin-bottom:20px">
          <label style="font-size:13px;font-weight:700;color:#444;display:block;margin-bottom:6px">نوع الحساب</label>
          <select id="accStatus"
            style="width:100%;padding:12px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Cairo,sans-serif;box-sizing:border-box;background:#fff;outline:none">
            <option value="active">✅ نشط</option>
            <option value="vip">👑 VIP</option>
            <option value="late">⚠️ متأخر</option>
          </select>
        </div>
        <button type="submit" id="saveAccBtn"
          style="width:100%;padding:14px;background:linear-gradient(135deg,#8B0000,#660000);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif;transition:all 0.3s">
          💾 حفظ الحساب في قاعدة البيانات
        </button>
      </form>
    </div>
  </div>

  <script type="module">
  import { addAccount, listenAccounts, logWA } from "../firebase.js";

  let allAccounts = [];
  let currentFilter = 'all';
  let currentSearch = '';

  // دالة آمنة لتنسيق رقم الهاتف
  function formatPhoneNumber(phone) {
    if (!phone || typeof phone !== 'string') return null;
    const clean = phone.replace(/[^0-9]/g, '');
    if (clean.length === 0) return null;
    if (clean.startsWith('00')) return clean.slice(2);
    if (clean.startsWith('0')) return '967' + clean.slice(1);
    return clean;
  }

  // تحديث الإحصاءات
  function updateStats() {
    const stats = document.querySelectorAll('.stat-card .stat-value');
    if (stats[0]) stats[0].textContent = allAccounts.length;
    if (stats[1]) stats[1].textContent = allAccounts.filter(a => a.status !== 'late').length;
    if (stats[2]) stats[2].textContent = allAccounts.filter(a => a.status === 'late').length;
  }

  // تسمية الحالة
  function statusLabel(status) {
    const labels = {
      'late': '<span style="background:#c62828;color:#fff;padding:2px 9px;border-radius:8px;font-size:11px">⚠️ متأخر</span>',
      'vip': '<span style="background:linear-gradient(135deg,#D4AF37,#c9a227);color:#fff;padding:2px 9px;border-radius:8px;font-size:11px">👑 VIP</span>',
      'active': '<span style="background:#2e7d32;color:#fff;padding:2px 9px;border-radius:8px;font-size:11px">✅ نشط</span>'
    };
    return labels[status] || labels['active'];
  }

  // عرض الحسابات
  function render() {
    const list = document.getElementById('accountsList');
    if (!list) return;

    let filtered = allAccounts;
    if (currentFilter !== 'all') {
      filtered = filtered.filter(a => a.status === currentFilter);
    }
    if (currentSearch) {
      filtered = filtered.filter(a =>
        (a.name || '').toLowerCase().includes(currentSearch.toLowerCase()) || 
        (a.phone || '').includes(currentSearch)
      );
    }

    if (!filtered.length) {
      list.innerHTML = '<p style="text-align:center;color:#999;padding:32px;font-family:Tajawal,sans-serif">لا توجد حسابات — اضغط ➕ لإضافة حساب جديد</p>';
      updateStats();
      return;
    }

    list.innerHTML = filtered.map(account => {
      const displayName = (account.name || 'ع').substring(0, 2);
      const formattedBalance = Number(account.balance || 0).toLocaleString('ar-SA');
      const safePhone = (account.phone || '').replace(/'/g, '');
      const safeName = (account.name || '').replace(/'/g, '');

      return `
        <div class="op-item">
          <div class="op-avatar" style="background:linear-gradient(135deg,#8B0000,#660000);font-size:14px;cursor:pointer"
            onclick="viewAccountDetails('${account.id}','${safeName}','${safePhone}','${account.balance || 0}')"
            title="تفاصيل الحساب">
            ${displayName}
          </div>
          <div class="op-info" style="flex:1">
            <div class="op-name">${account.name || '—'}</div>
            <div class="op-date">${account.phone || 'لا يوجد رقم'} · ${statusLabel(account.status)}</div>
          </div>
          <div style="text-align:left;display:flex;flex-direction:column;align-items:flex-end;gap:5px">
            <div style="font-size:15px;font-weight:800;color:#8B0000">${formattedBalance}</div>
            <div style="font-size:11px;color:#999">ر.ي</div>
            <button onclick="sendWAAccount('${safePhone}','${safeName}','${account.balance || 0}')"
              style="background:#25D366;color:#fff;border:none;border-radius:8px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:Cairo">
              💬 واتساب
            </button>
            <button onclick="goToTransfer('${account.id}','${safeName}','${safePhone}')"
              style="background:#8B0000;color:#fff;border:none;border-radius:8px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:Cairo;margin-top:3px">
              💸 حوالة
            </button>
          </div>
        </div>
      `;
    }).join('');

    updateStats();
  }

  // الذهاب للحوالة
  window.goToTransfer = function(accountId, name, phone) {
    if (!accountId) {
      showNotification('خطأ: معرف الحساب غير صحيح', 'error');
      return;
    }
    const params = new URLSearchParams({ id: accountId, name, phone });
    window.location.href = 'transfer.html?' + params.toString();
  };

  // عرض تفاصيل الحساب
  window.viewAccountDetails = function(id, name, phone, balance) {
    const msg = `📊 تفاصيل الحساب:\n━━━━━━━━━━━━━━━\n👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n💰 الرصيد: ${Number(balance).toLocaleString('ar-SA')} ر.ي`;
    if (typeof showNotification === 'function') showNotification(msg, 'info');
  };

  // إرسال واتساب آمن
  window.sendWAAccount = async function(phone, name, balance) {
    try {
      if (!phone || phone.trim() === '') {
        if (typeof showNotification === 'function') showNotification('لا يوجد رقم واتساب لهذا العميل', 'error');
        return;
      }

      const formattedPhone = formatPhoneNumber(phone);
      if (!formattedPhone) {
        if (typeof showNotification === 'function') showNotification('رقم الهاتف غير صحيح', 'error');
        return;
      }

      const msg = `🏦 نظام محمد سالم للحوالات
━━━━━━━━━━━━━━━
السلام عليكم ${name.trim()}

كشف حسابك:
💰 الرصيد الحالي: ${Number(balance).toLocaleString('ar-SA')} ر.ي

للاستفسار تواصل معنا 📞`;

      window.open('https://wa.me/' + formattedPhone + '?text=' + encodeURIComponent(msg), '_blank');
      await logWA({ type: 'account_statement', accountName: name.trim(), phone: formattedPhone, message: msg });
      if (typeof showNotification === 'function') showNotification('تم فتح واتساب ✓', 'success');
    } catch (error) {
      console.error('Error sending WhatsApp:', error);
      if (typeof showNotification === 'function') showNotification('خطأ في إرسال الواتساب', 'error');
    }
  };

  // التحكم بـ Modal
  const addNewAccountBtn = document.getElementById('addNewAccountBtn');
  const closeModalBtn = document.getElementById('closeModal');
  const addAccountModal = document.getElementById('addAccountModal');
  const addAccountForm = document.getElementById('addAccountForm');

  if (addNewAccountBtn) {
    addNewAccountBtn.addEventListener('click', () => {
      addAccountModal.style.display = 'flex';
    });
  }

  if (closeModalBtn) {
    closeModalBtn.addEventListener('click', () => {
      addAccountModal.style.display = 'none';
    });
  }

  if (addAccountModal) {
    addAccountModal.addEventListener('click', function(e) {
      if (e.target === this) this.style.display = 'none';
    });
  }

  // معالج النموذج
  if (addAccountForm) {
    addAccountForm.addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('saveAccBtn');
      const name = document.getElementById('accName').value.trim();
      const phone = document.getElementById('accPhone').value.trim();
      const balance = parseFloat(document.getElementById('accBalance').value) || 0;
      const status = document.getElementById('accStatus').value;

      if (!name) {
        if (typeof showNotification === 'function') showNotification('الرجاء إدخال اسم العميل', 'error');
        return;
      }

      if (btn) btn.disabled = true;
      if (btn) btn.textContent = '⏳ جاري الحفظ...';

      try {
        const formattedPhone = phone ? formatPhoneNumber(phone) : null;
        const docRef = await addAccount({ name, phone: formattedPhone || '', balance, status });

        if (!docRef || !docRef.id) throw new Error('فشل حفظ الحساب');

        addAccountModal.style.display = 'none';
        this.reset();

        if (formattedPhone) {
          const welcomeMsg = `🏦 نظام محمد سالم للحوالات
━━━━━━━━━━━━━━━━━━
👋 مرحباً ${name}!

تم تسجيلك بنجاح في النظام
معرف حسابك: ${docRef.id}
الرصيد الابتدائي: ${Number(balance).toLocaleString('ar-SA')} ر.ي

🔒 نتمنى لك خدمة ممتازة`;

          try {
            window.open('https://wa.me/' + formattedPhone + '?text=' + encodeURIComponent(welcomeMsg), '_blank');
            await logWA({ type: 'account_welcome', accountName: name, phone: formattedPhone, message: welcomeMsg });
          } catch (waError) {
            console.warn('WhatsApp warning:', waError);
          }
        }

        if (typeof showNotification === 'function') showNotification(`✅ تم إنشاء الحساب بنجاح`, 'success');

      } catch (error) {
        console.error('Error adding account:', error);
        if (typeof showNotification === 'function') showNotification(`❌ خطأ: ${error.message || 'حدث خطأ أثناء حفظ الحساب'}`, 'error');
      } finally {
        if (btn) btn.disabled = false;
        if (btn) btn.textContent = '💾 حفظ الحساب في قاعدة البيانات';
      }
    });
  }

  // البحث والفلترة
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      currentSearch = this.value;
      render();
    });
  }

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter || 'all';
      render();
    });
  });

  // الاستماع للحسابات من Firebase
  listenAccounts(accounts => {
    allAccounts = accounts || [];
    render();
  });

  </script>

  </body>
</html>
