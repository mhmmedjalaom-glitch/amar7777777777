<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>العملاء المميزين VIP - نظام محمد سالم</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="sub-header">
    <div class="sub-header-top"><img src="../logo.svg" alt="شعار" style="width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(212,175,55,0.7);flex-shrink:0;margin-left:4px" />
      <div class="back-btn">➡️</div>
      <span class="sub-header-title">👑 النخبة · VIP</span>
      <div style="width:38px"></div>
    </div>
    <div class="sub-header-subtitle">إدارة حسابات كبار الشخصيات والخدمات السريعة</div>
  </div>

  <div class="page-content">

    <!-- VIP Stats -->
    <div style="background:linear-gradient(135deg,#fff8e1,#fff3cd);border:1px solid #ffd54f;border-radius:16px;padding:16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:#f57f17">إجمالي أرصدة VIP</div>
        <span class="badge badge-gold">👑 النخبة</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:12px">
        <span id="vipTotalBalance" style="font-size:30px;font-weight:800;color:#8B0000">0</span>
        <span style="font-size:14px;color:#666;font-family:Tajawal,sans-serif">ر.ي</span>
      </div>
      <div style="display:flex;gap:16px">
        <div>
          <div id="vipActiveCount" style="font-size:20px;font-weight:800;color:#2e7d32">0</div>
          <div style="font-size:11px;color:#666;font-family:Tajawal,sans-serif">نشط حالياً</div>
        </div>
        <div style="width:1px;background:#ffd54f"></div>
        <div>
          <div id="vipNeedingCount" style="font-size:20px;font-weight:800;color:#e65100">0</div>
          <div style="font-size:11px;color:#666;font-family:Tajawal,sans-serif">يحتاج متابعة</div>
        </div>
      </div>
    </div>

    <!-- VIP Clients -->
    <div class="section-header">
      <span class="section-title">👑 عملاء VIP</span>
      <span class="section-link" id="vipClientCount">0 عميل</span>
    </div>

    <div class="op-list" id="vipList" style="margin-bottom:20px">
      <p style="text-align:center;color:#999;padding:32px;font-family:Tajawal,sans-serif">جاري تحميل عملاء VIP...</p>
    </div>

    <div style="height:10px"></div>
    <button class="btn btn-secondary" onclick="window.location.href='accounts.html'" style="width:100%">
      ➕ إدارة الحسابات
    </button>

  </div>

  <nav class="bottom-nav">
    <div class="nav-item" data-href="../index.html">
      <span class="nav-icon">🏠</span><span>الرئيسية</span>
    </div>
    <div class="nav-item" data-href="transfer.html">
      <span class="nav-icon">💸</span><span>تحويل</span>
    </div>
    <div class="nav-item active" data-href="vip.html">
      <span class="nav-icon">👑</span><span>المميزين</span>
    </div>
    <div class="nav-item" data-href="reports.html">
      <span class="nav-icon">📊</span><span>تقارير</span>
    </div>
  </nav>


  <script>
  // ⚡ عرض VIP فوراً
  (function(){
    function ls(k){try{return JSON.parse(localStorage.getItem("ms_"+k)||"[]")}catch{return[]}}
    var accounts=ls("accounts");
    var vip=accounts.filter(function(a){return a.status==='vip'||a.status==='VIP'});
    var totalBal=vip.reduce(function(s,a){return s+(Number(a.balance)||0)},0);
    var setEl=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v};
    setEl('vipTotalBalance',totalBal.toLocaleString('ar-SA'));
    setEl('vipActiveCount',vip.filter(function(a){return Number(a.balance||0)>0}).length);
    setEl('vipNeedingCount',vip.filter(function(a){return Number(a.balance||0)<=0}).length);
    setEl('vipClientCount',vip.length+' عميل');
    var list=document.getElementById('vipList');
    if(!list) return;
    if(!vip.length){
      list.innerHTML='<p style="text-align:center;color:#999;padding:30px;font-family:Tajawal">لا يوجد عملاء VIP. أنشئ حساباً وحدده كـ VIP.</p>';
      return;
    }
    list.innerHTML=vip.map(function(a){
      var ini=(a.name||'VIP').substring(0,2);
      var sp=(a.phone||'').replace(/'/g,'');
      var sn=(a.name||'').replace(/'/g,'');
      return '<div class="op-item">'+
        '<div class="op-avatar" style="background:linear-gradient(135deg,#D4AF37,#c9a227);cursor:pointer;font-size:14px" onclick="window.sendVIPMsg(''+sp+'',''+sn+'')">'+ini+'</div>'+
        '<div class="op-info">'+
          '<div class="op-name">'+a.name+' <span style="background:linear-gradient(135deg,#D4AF37,#c9a227);color:#fff;padding:1px 7px;border-radius:8px;font-size:10px">👑 VIP</span></div>'+
          '<div class="op-date">'+(a.phone||'لا يوجد رقم')+'</div>'+
        '</div>'+
        '<div style="text-align:left">'+
          '<div style="font-size:16px;font-weight:800;color:#8B0000">'+Number(a.balance||0).toLocaleString('ar-SA')+'</div>'+
          '<div style="font-size:11px;color:#999">ر.ي</div>'+
        '</div>'+
      '</div>';
    }).join('');
  })();
  </script>
  <script src="../script.js"></script>

  <script type="module">
    import { listenAccounts, logWA } from "../firebase.js";

    const WA = '967733231636';

    function openWA(phone, text) {
      const clean = String(phone || WA).replace(/[^0-9]/g, '');
      const num = clean.startsWith('00') ? clean.slice(2) : 
                  clean.startsWith('0') ? '967' + clean.slice(1) : 
                  clean || WA;
      window.open('https://wa.me/' + num + '?text=' + encodeURIComponent(text), '_blank');
    }

    listenAccounts(accounts => {
      if (!accounts || accounts.length === 0) {
        const listEl = document.getElementById('vipList');
        listEl.innerHTML = '<p style="text-align:center;color:#999;padding:30px;font-family:Tajawal">لا يوجد عملاء VIP بعد. أنشئ حساباً من صفحة الحسابات وحدده كـ VIP.</p>';
        document.getElementById('vipTotalBalance').textContent = '0';
        document.getElementById('vipActiveCount').textContent = '0';
        document.getElementById('vipNeedingCount').textContent = '0';
        document.getElementById('vipClientCount').textContent = '0 عميل';
        return;
      }

      const vip = accounts.filter(a => a.status === 'vip' || a.status === 'VIP');
      const active = vip.filter(a => Number(a.balance || 0) > 0);
      const needing = vip.filter(a => Number(a.balance || 0) <= 0);
      const totalBal = vip.reduce((s, a) => s + (Number(a.balance) || 0), 0);

      // تحديث الإحصاءات
      document.getElementById('vipTotalBalance').textContent = totalBal.toLocaleString('ar-SA');
      document.getElementById('vipActiveCount').textContent = active.length;
      document.getElementById('vipNeedingCount').textContent = needing.length;
      document.getElementById('vipClientCount').textContent = vip.length + ' عميل';

      // قائمة VIP
      const listEl = document.getElementById('vipList');
      
      if (!vip.length) {
        listEl.innerHTML = '<p style="text-align:center;color:#999;padding:30px;font-family:Tajawal">لا يوجد عملاء VIP. أنشئ حساباً وحدده كـ VIP.</p>';
        return;
      }

      listEl.innerHTML = vip.map(a => `
        <div class="op-item">
          <div class="op-avatar" style="background:linear-gradient(135deg,#D4AF37,#c9a227);cursor:pointer;font-size:14px" 
            onclick="window.sendVIPMsg('${(a.phone || WA).replace(/'/g, '')}', '${(a.name || 'VIP').replace(/'/g, '')}')"
            title="إرسال رسالة واتساب">
            ${(a.name || 'VIP').substring(0, 2)}
          </div>
          <div class="op-info">
            <div class="op-name">
              ${a.name || '—'} 
              <span style="background:linear-gradient(135deg,#D4AF37,#c9a227);color:#fff;padding:1px 7px;border-radius:8px;font-size:10px">👑 VIP</span>
            </div>
            <div class="op-date">${a.phone || 'لا يوجد رقم'}</div>
          </div>
          <div style="text-align:left">
            <div style="font-size:16px;font-weight:800;color:#8B0000">${Number(a.balance || 0).toLocaleString('ar-SA')}</div>
            <div style="font-size:11px;color:#999">ر.ي</div>
          </div>
        </div>
      `).join('');
    });

    window.sendVIPMsg = async function(phone, name) {
      try {
        const msg = `السلام عليكم ${name}، نظام محمد سالم للحوالات يرحب بك كعميل VIP. لأي استفسار نحن في خدمتك.`;
        const clean = String(phone || WA).replace(/[^0-9]/g, '');
        const num = clean.startsWith('00') ? clean.slice(2) : 
                    clean.startsWith('0') ? '967' + clean.slice(1) : 
                    clean || WA;
        
        window.open('https://wa.me/' + num + '?text=' + encodeURIComponent(msg), '_blank');
        
        await logWA({ 
          type: 'vip_message', 
          accountName: name, 
          phone: num, 
          message: msg 
        });
        
        if (typeof showNotification === 'function') 
          showNotification('✅ تم فتح واتساب', 'success');
      } catch(err) {
        console.error('Error sending VIP message:', err);
        if (typeof showNotification === 'function') 
          showNotification('❌ خطأ في الإرسال', 'error');
      }
    };

  </script>

</body>
</html>
